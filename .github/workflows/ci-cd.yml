name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC -> AWS role assumption
  contents: read
  pull-requests: write  # required to post the terraform plan as a PR comment

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform/environments/dev

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t net-infra-monitor:${{ github.sha }} .

  terraform-plan:
    runs-on: ubuntu-latest
    needs: lint
    # Runs on PRs (to comment a plan for review) and on pushes to main
    # (so the apply job below has a fresh plan to act on).
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan_output.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [terraform-plan, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # This environment must be configured in GitHub repo settings with a
    # required reviewer. That's what makes this a real manual approval
    # gate rather than a comment — the job will pause here until someone
    # approves it in the Actions UI.
    environment: production-infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

  deploy-app:
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
